name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff>=0.7.0
      - name: Lint check
        run: ruff check src/
      - name: Format check
        run: ruff format --check src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache spaCy model
        uses: actions/cache@v4
        with:
          path: ~/.cache/spacy
          key: spacy-en_core_web_lg-3.8.0

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" pytest-cov
          python -m spacy download en_core_web_lg

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=pw_redact --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
